name: docker-publish

# Build multi-arch container images on NATIVE runners (no QEMU emulation):
# amd64 on ubuntu-24.04, arm64 on ubuntu-24.04-arm. Two images are built — the
# web app (with Chromium for PDFs) and the slim email-ingestion poller — each
# built + pushed by digest per arch, then assembled into a per-image manifest
# list. Images are only pushed to GHCR on merge to main; pull requests build (to
# validate) but do not push.

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - key: web
            suffix: ""
            dockerfile: Dockerfile
          - key: poller
            suffix: /poller
            dockerfile: Dockerfile.poller
        arch:
          - id: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - id: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image.suffix }}

      - name: Build ${{ matrix.image.key }} (${{ matrix.arch.id }}) and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.arch.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.key }}-${{ matrix.arch.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.key }}-${{ matrix.arch.id }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image.suffix }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image.key }}-${{ matrix.arch.id }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    # Assemble a manifest list per image from its per-arch digests. Push on merge.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - { key: web, suffix: "" }
          - { key: poller, suffix: /poller }
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image.key }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image.suffix }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image.suffix }}@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image.suffix }}:latest
