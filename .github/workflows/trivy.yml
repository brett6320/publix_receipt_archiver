name: trivy

# Known-CVE Python packages in requirements.txt. Fast, no Docker; runs on
# every push/PR and fails the job on HIGH/CRITICAL.
#
# Uses --ignore-unfixed: only fail on CVEs PyPI has actually shipped a fix
# for — gating on not-yet-fixed-upstream findings is a perpetual, unwinnable
# red build.
#
# (Published GHCR image scanning lives in trivy-image.yml — it has to trigger
# off docker-publish's completion rather than the same push event, so it
# can't share this workflow's `on:` block.)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  deps:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - name: Scan requirements.txt for known-CVE dependencies
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: requirements.txt
          format: sarif
          output: trivy-deps.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-deps.sarif
          category: trivy-deps
