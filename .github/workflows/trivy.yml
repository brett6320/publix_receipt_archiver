name: trivy

# Two independent scans:
#   deps  - known-CVE Python packages in requirements.txt. Fast, no Docker;
#           runs on every push/PR and fails the job on HIGH/CRITICAL.
#   image - OS + package CVEs in the published GHCR images (web app w/
#           Chromium, and the slim poller). Gating: fails on HIGH/CRITICAL, on
#           a weekly cadence plus manual dispatch and every push to main.
#           NOTE: this scans the already-pushed `:latest` tag after
#           docker-publish.yml has published it (they run in parallel on
#           push), so a failure here doesn't block that publish — it flags
#           the image as bad after the fact. Gating the publish itself would
#           mean scanning the freshly-built image before push, which needs
#           docker-publish.yml restructured to build+load locally first.
#
# Known as of 2026-07-16: both images currently fail this gate on real
# HIGH-severity base-OS CVEs (see the repo's Security tab for the full list,
# e.g. CVE-2026-56000, CVE-2026-55999, CVE-2023-5574, CVE-2026-53615) — a base
# image bump/rebuild is needed to clear it.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1" # weekly Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deps:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - name: Scan requirements.txt for known-CVE dependencies
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: requirements.txt
          format: sarif
          output: trivy-deps.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-deps.sarif
          category: trivy-deps

  image:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - key: web
            ref: ghcr.io/${{ github.repository }}:latest
          - key: poller
            ref: ghcr.io/${{ github.repository }}/poller:latest
    steps:
      - name: Scan ${{ matrix.image.key }} image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.image.ref }}
          format: sarif
          output: trivy-${{ matrix.image.key }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.key }}.sarif
          category: trivy-image-${{ matrix.image.key }}
