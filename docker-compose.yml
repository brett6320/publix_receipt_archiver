services:
  web:
    build: .
    image: publix-receipt-archiver
    environment:
      # Change the port here (or `PORT=9000 docker compose up`).
      PORT: ${PORT:-8000}
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      # Persist receipts, CSVs, PDFs, markdown, and credentials on the host.
      - ./data:/app/data
    restart: unless-stopped

  # Email ingestion poller: pulls forwarded Publix receipts from the Cloudflare
  # queue (see cloudflare/README.md), ingests them, and deletes on success.
  # Uses the pre-built, published slim poller image (no Chromium). Shares ./data
  # with `web`, so it also honors settings saved in the admin UI
  # (data/email_config.json). Runs only under the `email` profile.
  email-poller:
    image: ghcr.io/brett6320/publix_receipt_archiver/poller:${IMAGE_TAG:-latest}
    profiles: ["email"]
    environment:
      # These are optional if you configure email ingestion in the admin UI.
      PUBLIX_EMAIL_POLL_INTERVAL: ${PUBLIX_EMAIL_POLL_INTERVAL:-300}
      PUBLIX_R2_ACCOUNT_ID: ${PUBLIX_R2_ACCOUNT_ID:-}
      PUBLIX_R2_BUCKET: ${PUBLIX_R2_BUCKET:-}
      PUBLIX_R2_ACCESS_KEY_ID: ${PUBLIX_R2_ACCESS_KEY_ID:-}
      PUBLIX_R2_SECRET_ACCESS_KEY: ${PUBLIX_R2_SECRET_ACCESS_KEY:-}
      PUBLIX_R2_PREFIX: ${PUBLIX_R2_PREFIX:-receipts/}
      PUBLIX_CF_QUEUE_ID: ${PUBLIX_CF_QUEUE_ID:-}
      PUBLIX_CF_API_TOKEN: ${PUBLIX_CF_API_TOKEN:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
